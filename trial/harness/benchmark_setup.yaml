protocol:
  truth_policy: PGO poses are SILVER; decimeter floor on long accumulation
                windows; ~6 cm PGO run-to-run wobble between two independent
                builds of the same recording
  determinism: per-frame seeds = frame_idx; OMP_NUM_THREADS=1 before open3d
               import; full denominator (crashes/no-candidates = failures)
  handoff: sections + fixes feed the relocalization-confidence harness
           (run_bench.py / analyze.py)

# --- v2 target set (Aaryan, Jul 18: "we should have a good set for the benchmark") ---
# The current set is TIER A = adversarial shorts (lesh's own description: very short
# clips, robot thrown around; PGO defaults were TUNED on the villages — in-sample).
# Good for mechanisms and regression, statistically thin for grading. Robot day
# starts TIER B: operational recordings. A recording qualifies for tier B only if
# ALL of these hold (they are pass criteria for the RECORDING, not the robot):
suite_v2_acceptance:
  duration_s: ">=600 (10 min); target 10-20 min of walking-speed operation, not stress handling"
  scenarios_in_run: "normal loop + one kidnap segment + one power-on-near-tag start, in the same recording where practical"
  rigs: "capture each space twice when hardware allows: go2-only AND go2+mid360"
  provenance: "recording name states date/place/rig, logged here"
tier_a_legacy: [hk_village1, hk_village3, hk_village5, hk_village6,
                recording_go2_mid360_2026-05-29_4-45pm-PST]
confidence_eval_only: [hk_building_all_around, go2_hongkong_office]  # tag-free: module
                # confidence evals vs PGO-silver — NOT benchmark-grade (Jul 19)
tier_b_planned: "robot day Jul 18, SF office — target 4-6 recordings (2 rigs x 2-3 runs); added here as they land"
