# THE RELOCALIZATION BENCHMARK — canonical setup (v1, 2026-07-17, Aaryan + night session)
#
# Taxonomy (Aaryan, Jul 17):
#   relocalization benchmark  = THIS: marker-truth, offline referee. Physical tags
#                               as external truth; grades PGO and any relocalizer.
#   relocalization confidence = separate, real-time track: pluggable priors -> one
#                               judge -> one published score; decides between/fuses
#                               priors on-robot. The benchmark calibrates it offline.
#
# Tag policy (the decorrelation rule):
#   Each recording designates ONE referee tag — the "start/end tag" — used ONLY for
#   benchmarking. It NEVER enters the marker map and NEVER produces fiducial fixes.
#   All other tag ids are the live-fiducial set (marker map + FiducialPrior fixes).
#   Selection rule: the id with the widest start-to-end sighting coverage across the
#   run (strongest revisit anchor), validated single-instance by the spatial-cluster
#   check (duplicate physical ids invalidate an id as referee — see hk_village2/4).
#
# Referee decisions (from detection sweeps over 3 candidate runs, 2026-07-17):

recordings:
  recording_go2_mid360_2026-05-29_4-45pm-PST:
    role: primary multi-tag benchmark run (BOTH lidar lanes in one file)
    referee_tag: 4          # seen 0.0% -> 98.7% of the 780 s run; span 769.6 s
    fiducial_tags: [0, 1, 2, 6, 7]   # id 6 is weak (24.5 s span) but valid
    lanes:
      go2:
        lidar: lidar
        odom: odom
        note: "lidar obs poses are placeholders — re-pose from odom payload"
      mid360_fastlio:
        lidar: fastlio_lidar
        odom: fastlio_odometry
        note: "placeholder poses too — re-pose from fastlio_odometry payload.
          MEASURED (Jul 17) — 300s+ revisit raw 0.035–0.111 m (LIO drift ~2 cm over
          13 min; ~100–250x tighter than go2 lane's 8.80 m); PGO on top
          benign-to-mildly-helpful — unnecessary, not harmful"

  markers_go2:
    role: REMOVED from the set (Aaryan Jul 17) — lidar obs carry no poses, so it
          can never grade PGO or the module; detector-dev recording only
  hk_village1: {role: referee-only, referee_tag: 10, fiducial_tags: []}
  hk_village3: {role: referee-only, referee_tag: 10, fiducial_tags: []}
  hk_village5: {role: referee-only, referee_tag: 10, fiducial_tags: []}
  hk_village6: {role: referee-only, referee_tag: 10, fiducial_tags: []}
  hk_village2: {role: EXCLUDED, reason: 3 physical tags share id 10 (cluster check)}
  hk_village4: {role: EXCLUDED, reason: 2 physical tags share id 10 (cluster check)}
  hk_building_all_around:
    role: CONFIDENCE-EVAL ONLY, NOT a benchmark run (Aaryan Jul 19 reclassification —
          tag-free means no external referee, so truth is self-referential PGO-silver;
          this grades the relocal MODULE's confidence, never PGO itself; kept for
          environment diversity in the thresholds-don't-transfer finding) —
          measured 83.3% (20/24) ransac, 0.028 m median on successes, 24.6 s median
          solve on the 1.4M-pt premap; failures at fitness 0.32-0.66 (the 0.45 gate
          correctly rejects 3 of 4 HERE — unlike the villages); only 3 loop closures,
          truth thin; NO marker referee (VERIFIED tag-free, 0/663 sampled frames)
    referee_tag: null
  go2_hongkong_office:
    role: CONFIDENCE-EVAL ONLY, NOT a benchmark run (same Jul 19 reclassification —
          no referee, self-referential PGO-silver truth) — no tags (verified, 0/398
          sampled frames);
          measured 80% (32/40, full denominator) ransac, 0.033 m median on
          successes, 41 s median solve on the 850k-pt premap
    referee_tag: null
  china_office: {role: EXCLUDED, reason: Aaryan 2026-07-17 — do not use}

  sf_office_go2_20260718_survey1:
    role: "TIER B operational — FIRST SF-office recording (454 Natoma). go2-only rig,
      13.6 min continuous (max stream gap 1.9 s), survey pass + loop + mid-run kidnap.
      Streams: color 4105@5.0 Hz / lidar 5479@6.7 Hz / odom 15184@18.5 Hz. Live census
      during capture (spy on marker TFs): 6 physical tags, all multi-sighted.
      Local file: trial/harness/out/robot_day/ (2.38 GB; not in the shared catalog yet
      — no-remote rule)."
    referee_tag: 19         # the pre-existing wall start/end tag (Aaryan); >=3 revisit
                            # waves observed live; chosen BEFORE any grading
    fiducial_tags: [2, 3, 5, 6, 7]   # the Jul 18 printed 100 mm singles

protocol:
  revisit_test: same-referee-tag pairwise distance, stratified by time gap
                (0-10 / 10-30 / 30-60 / 60+ s); raw odometry vs corrected;
                report per-visit composition, never aggregate alone
  validity_gate: spatial-cluster check per id (single-linkage, 1.0 m) before
                 trusting any id as referee or map entry
  truth_policy: PGO poses are SILVER, qualified per recording by the revisit
                test; referee-tag agreement is co-truth; decimeter floor on
                long accumulation windows; ~6 cm PGO run-to-run wobble
  determinism: per-frame seeds = frame_idx; OMP_NUM_THREADS=1 before open3d
               import; full denominator (crashes/no-candidates = failures)
  handoff: sections + fixes (fiducial tags only) feed the relocalization-
           confidence harness (run_bench.py / analyze.py)

# --- v2 target set (Aaryan, Jul 18: "we should have a good set for the benchmark") ---
# The current set is TIER A = adversarial shorts (lesh's own description: very short
# clips, robot thrown around; PGO defaults were TUNED on the villages — in-sample).
# Good for mechanisms and regression, statistically thin for grading. Robot day
# starts TIER B: operational recordings. A recording qualifies for tier B only if
# ALL of these hold (they are pass criteria for the RECORDING, not the robot):
suite_v2_acceptance:
  tag_split: ">=2 fiducial tags in the marker map + 1 DISTINCT referee id, unique ids per space"
  duration_s: ">=600 (10 min); target 10-20 min of walking-speed operation, not stress handling"
  referee_revisits: ">=3 returns to the referee tag (visit-level statistics need n>=3, not bookends)"
  scenarios_in_run: "normal loop + one kidnap segment + one power-on-near-tag start, in the same recording where practical"
  rigs: "capture each space twice when hardware allows: go2-only AND go2+mid360"
  provenance: "recording name states date/place/rig; referee id chosen BEFORE grading, logged here"
tier_a_legacy: [hk_village1, hk_village3, hk_village5, hk_village6,
                recording_go2_mid360_2026-05-29_4-45pm-PST]
confidence_eval_only: [hk_building_all_around, go2_hongkong_office]  # tag-free: module
                # confidence evals vs PGO-silver — NOT benchmark-grade (Jul 19)
tier_b_planned: "robot day Jul 18, SF office — target 4-6 recordings (2 rigs x 2-3 runs); added here as they land"
# Tier-B registration template (copy under `recordings:` BEFORE building any marker map —
# make_rehearsal_marker_map.py reads the referee id from here; an unregistered recording
# skips the referee-refusal safety entirely):
#   sf_office_go2_<date>_survey1:
#     role: tier B operational (SF office, go2-only rig)
#     referee_tag: 10          # grades only — never in any marker_map.yaml
#     fiducial_tags: [0, 1, 2, 3, 4, 5]

publication_intent: push under a "relocalization benchmark" home on GitHub
                    (Aaryan, Jul 17 — "maybe"; NOT pushed yet, no-remote rule)
