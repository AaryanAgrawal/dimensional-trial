# THE RELOCALIZATION BENCHMARK — canonical setup (v1, 2026-07-17, Aaryan + night session)
#
# Taxonomy (Aaryan, Jul 17):
#   relocalization benchmark  = THIS: marker-truth, offline referee. Physical tags
#                               as external truth; grades PGO and any relocalizer.
#   relocalization confidence = separate, real-time track: pluggable priors -> one
#                               judge -> one published score; decides between/fuses
#                               priors on-robot. The benchmark calibrates it offline.
#
# Grading method (canonical, see trial/harness/BENCHMARK_METHOD.md):
#   Grade the REAL pipeline under `dimos --replay run <blueprint>` via replay_bench.py +
#   score_replay.py — the harness re-implements NO data-path step. Premap = real
#   `dimos map global --pgo --export`; truth = real PGO `correction_at`. The old sections
#   path (prep.py body-frame submaps + run_bench.py's direct relocalize()) is SUPERSEDED:
#   its body-frame re-anchor manufactured the phantom mid360 gravity-gate bug. Kept for its
#   archived SILVER numbers only; do not produce new numbers on it.
#
# Tag policy (the decorrelation rule):
#   Each recording designates ONE referee tag — the "start/end tag" — used ONLY for
#   benchmarking. It NEVER enters the marker map and NEVER produces fiducial fixes.
#   All other tag ids are the live-fiducial set (marker map + FiducialPrior fixes).
#   Selection rule: the id with the widest start-to-end sighting coverage across the
#   run (strongest revisit anchor), validated single-instance by the spatial-cluster
#   check (duplicate physical ids invalidate an id as referee — see hk_village2/4).
#
# Referee decisions (from detection sweeps over 3 candidate runs, 2026-07-17):

