# THE RELOCALIZATION BENCHMARK — canonical setup (v1, 2026-07-17, Aaryan + night session)
#
# This file is a MANIFEST: which recordings exist, what role each plays, which are
# excluded and why, and each one's lane wiring. No code reads it — trial/PLAN.md:17
# uses it as the same-scene pair list for the premap benchmark.
#
# Grading method (canonical, see trial/harness/BENCHMARK_METHOD.md):
#   Grade the REAL pipeline under `dimos --replay run <blueprint>` via replay_bench.py +
#   score_replay.py — the harness re-implements NO data-path step. Premap = real
#   `dimos map global --pgo --export`; truth = real PGO `correction_at`. The old sections
#   path (prep.py body-frame submaps + run_bench.py's direct relocalize()) is SUPERSEDED:
#   its body-frame re-anchor manufactured the phantom mid360 gravity-gate bug. Kept for its
#   archived SILVER numbers only; do not produce new numbers on it.
#
# DEPRECATED 2026-07-22: the referee-tag split (one id per recording held out to grade
# against) is gone, with its instruments (referee_verdict.py, cluster_gate.py,
# show_benchmark.py, fig3_hardened.py, fastlio_lane_markers.py) — last present at git
# b713aec. Relocalization is scored against the PREMAP now. Per-recording `referee_tag:`
# and `fiducial_tags:` were merged into one `tags:` list; role prose below still names
# the historical referee decisions where they explain an exclusion.

recordings:
  recording_go2_mid360_2026-05-29_4-45pm-PST:
    role: primary multi-tag benchmark run (BOTH lidar lanes in one file)
    tags: [0, 1, 2, 4, 6, 7]   # id 6 is weak (24.5 s span) but valid; id 4 spans 769.6 s
    lanes:
      go2:
        lidar: lidar
        odom: odom
        note: "lidar obs poses are placeholders — re-pose from odom payload"
      mid360_fastlio:
        lidar: fastlio_lidar
        odom: fastlio_odometry
        note: "placeholder poses too — re-pose from fastlio_odometry payload.
          MEASURED (Jul 17) — 300s+ revisit raw 0.035–0.111 m (LIO drift ~2 cm over
          13 min; ~100–250x tighter than go2 lane's 8.80 m); PGO on top
          benign-to-mildly-helpful — unnecessary, not harmful"

  markers_go2:
    role: REMOVED from the set (Aaryan Jul 17) — lidar obs carry no poses, so it
          can never grade PGO or the module; detector-dev recording only
  hk_village1: {role: single-tag run, tags: [10]}
  hk_village3: {role: single-tag run, tags: [10]}
  hk_village5: {role: single-tag run, tags: [10]}
  hk_village6: {role: single-tag run, tags: [10]}
  hk_village2: {role: EXCLUDED, reason: 3 physical tags share id 10 (cluster check)}
  hk_village4: {role: EXCLUDED, reason: 2 physical tags share id 10 (cluster check)}
  hk_building_all_around:
    role: CONFIDENCE-EVAL ONLY, NOT a benchmark run (Aaryan Jul 19 reclassification —
          tag-free means no external anchor, so truth is self-referential PGO-silver;
          this grades the relocal MODULE's confidence, never PGO itself; kept for
          environment diversity in the thresholds-don't-transfer finding) —
          measured 83.3% (20/24) ransac, 0.028 m median on successes, 24.6 s median
          solve on the 1.4M-pt premap; failures at fitness 0.32-0.66 (the 0.45 gate
          correctly rejects 3 of 4 HERE — unlike the villages); only 3 loop closures,
          truth thin (VERIFIED tag-free, 0/663 sampled frames)
    tags: []
  go2_hongkong_office:
    role: CONFIDENCE-EVAL ONLY, NOT a benchmark run (same Jul 19 reclassification —
          no external anchor, self-referential PGO-silver truth) — no tags (verified,
          0/398 sampled frames);
          measured 80% (32/40, full denominator) ransac, 0.033 m median on
          successes, 41 s median solve on the 850k-pt premap
    tags: []
  china_office: {role: EXCLUDED, reason: Aaryan 2026-07-17 — do not use}

  sf_office_go2_20260718_survey1:
    role: "TIER B. FIRST SF-office recording (454 Natoma). go2-only rig,
      13.6 min continuous (max stream gap 1.9 s), survey pass + loop + mid-run kidnap.
      Streams: color 4105@5.0 Hz / lidar 5479@6.7 Hz / odom 15184@18.5 Hz. Live census
      during capture (spy on marker TFs): 6 physical tags, all multi-sighted.
